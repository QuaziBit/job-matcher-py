<script>
"use strict";

// ── Runner ────────────────────────────────────────────────────────────────────

const output = [];
let _passed = 0, _failed = 0;

function section(name) {
  output.push({ type: "section", name });
  console.log(`\n── ${name}`);
}

function test(name, fn) {
  try {
    fn();
    _passed++;
    output.push({ type: "pass", name });
    console.log(`  ✓ ${name}`);
  } catch(e) {
    _failed++;
    output.push({ type: "fail", name, msg: e.message });
    console.error(`  ✗ ${name} — ${e.message}`);
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || "assertion failed");
}
function assertEqual(a, b) {
  if (a !== b) throw new Error(`expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}
function assertContains(str, sub) {
  if (!str.includes(sub)) throw new Error(`expected string to contain "${sub}"\ngot: ${str.slice(0,300)}`);
}
function assertNotContains(str, sub) {
  if (str.includes(sub)) throw new Error(`expected string NOT to contain "${sub}"`);
}
function assertClass(el, cls) {
  if (!el.classList.contains(cls)) throw new Error(`expected element to have class "${cls}", got "${el.className}"`);
}
function assertNotClass(el, cls) {
  if (el.classList.contains(cls)) throw new Error(`expected element NOT to have class "${cls}"`);
}
function parseHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div;
}


// ════════════════════════════════════════════════════════════════════════════
// ── Utility functions
// ════════════════════════════════════════════════════════════════════════════

section("escHtml");

test("escapes ampersand",        () => assertContains(escHtml("a&b"),    "&amp;"));
test("escapes less-than",        () => assertContains(escHtml("a<b"),    "&lt;"));
test("escapes greater-than",     () => assertContains(escHtml("a>b"),    "&gt;"));
test("escapes double quote",     () => assertContains(escHtml('a"b'),    "&quot;"));
test("escapes single quote",     () => assertContains(escHtml("a'b"),    "&#39;"));
test("leaves safe string alone", () => assertEqual(escHtml("hello"),     "hello"));
test("handles null",             () => assertEqual(escHtml(null),        ""));
test("handles number",           () => assertEqual(escHtml(42),          "42"));
test("escapes XSS payload",      () => { const o = escHtml('<script>alert("xss")</sc' + 'ript>'); assertNotContains(o, "<script>"); assertContains(o, "&lt;script&gt;"); });


section("formatElapsed");

test("0 seconds",             () => assertEqual(formatElapsed(0),    "0s"));
test("45 seconds",            () => assertEqual(formatElapsed(45),   "45s"));
test("59 seconds",            () => assertEqual(formatElapsed(59),   "59s"));
test("60 seconds = 1:00",     () => assertEqual(formatElapsed(60),   "1:00"));
test("90 seconds = 1:30",     () => assertEqual(formatElapsed(90),   "1:30"));
test("61 seconds = 1:01",     () => assertEqual(formatElapsed(61),   "1:01"));
test("pads single-digit secs",() => assertEqual(formatElapsed(65),   "1:05"));
test("3600 seconds = 60:00",  () => assertEqual(formatElapsed(3600), "60:00"));


section("formatDuration");

test("0 returns empty",          () => assertEqual(formatDuration(0),   ""));
test("null returns empty",        () => assertEqual(formatDuration(null),""));
test("30 seconds",                () => assertEqual(formatDuration(30),  "30s"));
test("60 seconds = 1m",           () => assertEqual(formatDuration(60),  "1m"));
test("90 seconds = 1m 30s",       () => assertEqual(formatDuration(90),  "1m 30s"));
test("120 seconds = 2m",          () => assertEqual(formatDuration(120), "2m"));
test("rounds to nearest second",  () => assertEqual(formatDuration(30.4),"30s"));


section("getLocationFlag");

test("remote keyword",           () => assertEqual(getLocationFlag("Remote"),          "REMOTE"));
test("Canada city",              () => assertEqual(getLocationFlag("Toronto, ON"),     "CA"));
test("UK city",                  () => assertEqual(getLocationFlag("London, UK"),      "UK"));
test("Germany city",             () => assertEqual(getLocationFlag("Berlin, Germany"), "DE"));
test("USA explicit",             () => assertEqual(getLocationFlag("United States"),   "US"));
test("unknown defaults to US",   () => assertEqual(getLocationFlag("Springfield"),     "US"));
test("numeric-only returns N/A", () => assertEqual(getLocationFlag("12345"),           "N/A"));
test("empty string returns N/A", () => assertEqual(getLocationFlag(""),                "N/A"));
test("null returns N/A",         () => assertEqual(getLocationFlag(null),              "N/A"));
test("Singapore",                () => assertEqual(getLocationFlag("Singapore"),       "SG"));


section("formatJobDate");

test("empty string returns empty",       () => assertEqual(formatJobDate(""), ""));
test("null returns empty",               () => assertEqual(formatJobDate(null), ""));

test("includes year for old date",       () => assertContains(formatJobDate("2020-06-15 12:00:00"), "2020"));


section("log / logErr");

test("log does not throw",    () => log("test", "message", { extra: 1 }));
test("logErr does not throw", () => logErr("test", "error",  new Error("oops")));

section("toggleFieldEdit");

function makeFieldEditDOM() {
  ['title','company','location'].forEach(f => {
    let r = document.getElementById(`field-edit-row-${f}`);
    if (!r) {
      r = document.createElement('div');
      r.id = `field-edit-row-${f}`;
      r.style.display = 'none';
      const inp = document.createElement('input');
      inp.id = `field-edit-input-${f}`;
      r.appendChild(inp);
      document.body.appendChild(r);
    } else {
      r.style.display = 'none';
    }
  });
}
function cleanFieldEditDOM() {
  ['title','company','location'].forEach(f => {
    const r = document.getElementById(`field-edit-row-${f}`);
    if (r) document.body.removeChild(r);
  });
}

test("opens target row",             () => { makeFieldEditDOM(); toggleFieldEdit('title');    assertEqual(document.getElementById('field-edit-row-title').style.display,    'flex'); cleanFieldEditDOM(); });
test("closes already-open row",      () => { makeFieldEditDOM(); toggleFieldEdit('company');  toggleFieldEdit('company');  assertEqual(document.getElementById('field-edit-row-company').style.display,  'none'); cleanFieldEditDOM(); });
test("only one row open at a time",  () => { makeFieldEditDOM(); toggleFieldEdit('title');    toggleFieldEdit('company');  assertEqual(document.getElementById('field-edit-row-title').style.display,    'none'); cleanFieldEditDOM(); });
test("company row opens correctly",  () => { makeFieldEditDOM(); toggleFieldEdit('company');  assertEqual(document.getElementById('field-edit-row-company').style.display,  'flex'); cleanFieldEditDOM(); });
test("location row opens correctly", () => { makeFieldEditDOM(); toggleFieldEdit('location'); assertEqual(document.getElementById('field-edit-row-location').style.display, 'flex'); cleanFieldEditDOM(); });
test("noop for unknown field",       () => { makeFieldEditDOM(); toggleFieldEdit('bogus');    assertEqual(document.getElementById('field-edit-row-title').style.display,    'none'); cleanFieldEditDOM(); });


section("saveJobField");

let _sfFetchCalls = [];
let _sfFetchResult = { ok: true, json: async () => ({ ok: true, title: "Updated" }) };
const _origFetch = window.fetch;

function setupSaveFetch(result) {
  _sfFetchCalls = [];
  _sfFetchResult = result;
  window.fetch = async (url, opts) => { _sfFetchCalls.push({ url, opts }); return _sfFetchResult; };
}
function teardownSaveFetch() { window.fetch = _origFetch; }

test("calls correct URL for title",    async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,title:"X"}) }); await saveJobField(5,'title','X'); assert(_sfFetchCalls.length===1); assertContains(_sfFetchCalls[0].url,'/api/jobs/5/title'); teardownSaveFetch(); });
test("calls correct URL for company",  async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,company:"X"}) }); await saveJobField(5,'company','X'); assertContains(_sfFetchCalls[0].url,'/api/jobs/5/company'); teardownSaveFetch(); });
test("calls correct URL for location", async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,location:"X"}) }); await saveJobField(5,'location','X'); assertContains(_sfFetchCalls[0].url,'/api/jobs/5/location'); teardownSaveFetch(); });
test("uses PATCH method",              async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,title:"X"}) }); await saveJobField(3,'title','Dev'); assertEqual(_sfFetchCalls[0].opts.method,'PATCH'); teardownSaveFetch(); });
test("empty title — no fetch",         async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true}) }); await saveJobField(1,'title','   '); assertEqual(_sfFetchCalls.length, 0); teardownSaveFetch(); });
test("empty title — toast error",      async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true}) }); await saveJobField(1,'title',''); assertEqual(document.getElementById('toast').textContent, 'Title cannot be empty'); teardownSaveFetch(); });
test("empty company — fetch proceeds", async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,company:""}) }); await saveJobField(1,'company',''); assertEqual(_sfFetchCalls.length, 1); teardownSaveFetch(); });
test("empty location — fetch proceeds",async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,location:""}) }); await saveJobField(1,'location',''); assertEqual(_sfFetchCalls.length, 1); teardownSaveFetch(); });
test("server error — toast error",     async () => { setupSaveFetch({ ok:false, json: async()=>({error:"Not found"}) }); await saveJobField(1,'title','X'); assertContains(document.getElementById('toast').className,'error'); teardownSaveFetch(); });
test("sends field value in FormData",  async () => { setupSaveFetch({ ok:true, json: async()=>({ok:true,title:"Dev"}) }); await saveJobField(2,'title','Dev'); const fd = _sfFetchCalls[0].opts.body; assert(fd instanceof FormData); assertEqual(fd.get('title'),'Dev'); teardownSaveFetch(); });

section("toggleSnippets");

function makeSnippetDOM(visible) {
  const wrap = document.createElement("div"), btn = document.createElement("button"), div = document.createElement("div");
  div.style.display = visible ? "block" : "none";
  wrap.appendChild(btn); wrap.appendChild(div); document.body.appendChild(wrap);
  return { wrap, btn, div };

const VETTING_DATA = {

    { company: "Acme Corp", jobs: [
      { id:1, title:"Go Developer",  status:"applied",      scraped_at:"2024-06-15 10:00:00", recruiter_name:"Jane", recruiter_email:"jane@acme.com", recruiter_phone:"" },

    ]},
    { company: "Beta Inc", jobs: [
      { id:3, title:"Python Dev",    status:"interviewing", scraped_at:"2024-06-20 10:00:00", recruiter_name:"Bob",  recruiter_email:"bob@beta.com",  recruiter_phone:"" },
    ]},
  ],
  recruiters: [
    { name:"Jane Doe", email:"jane@acme.com", phone:"", companies:["Acme Corp"], jobs:[
      { id:1, title:"Go Developer", company:"Acme Corp", status:"applied" },
    ]},
    { name:"Bob Smith", email:"bob@beta.com", phone:"", companies:["Beta Inc"], jobs:[
      { id:3, title:"Python Dev",  company:"Beta Inc",  status:"interviewing" },
    ]},
  ],
};

function setupVettingFilters(search, status, dateFrom, dateTo) {
  _vettingData = VETTING_DATA;
  const s = document.getElementById('vetting-search');
  const st = document.getElementById('vetting-status');
  const df = document.getElementById('vetting-date-from');
  const dt = document.getElementById('vetting-date-to');
  if (s)  s.value  = search   || '';
  if (st) st.value = status   || '';
  if (df) df.value = dateFrom || '';
  if (dt) dt.value = dateTo   || '';
  applyVettingFilters();
}

  ["manual-form-PP2","mf-gd-rating-PP2"].forEach(id => document.getElementById(id)?.remove());
  assertEqual(val, "existing");
});
