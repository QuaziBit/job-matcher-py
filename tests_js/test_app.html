<script>
"use strict";

// ── Runner ────────────────────────────────────────────────────────────────────

const output = [];
let _passed = 0, _failed = 0;

function section(name) {
  output.push({ type: "section", name });
  console.log(`\n── ${name}`);
}

function test(name, fn) {
  try {
    fn();
    _passed++;
    output.push({ type: "pass", name });
    console.log(`  ✓ ${name}`);
  } catch(e) {
    _failed++;
    output.push({ type: "fail", name, msg: e.message });
    console.error(`  ✗ ${name} — ${e.message}`);
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || "assertion failed");
}
function assertEqual(a, b) {
  if (a !== b) throw new Error(`expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}
function assertContains(str, sub) {
  if (!str.includes(sub)) throw new Error(`expected string to contain "${sub}"\ngot: ${str.slice(0,300)}`);
}
function assertNotContains(str, sub) {
  if (str.includes(sub)) throw new Error(`expected string NOT to contain "${sub}"`);
}
function assertClass(el, cls) {
  if (!el.classList.contains(cls)) throw new Error(`expected element to have class "${cls}", got "${el.className}"`);
}
function assertNotClass(el, cls) {
  if (el.classList.contains(cls)) throw new Error(`expected element NOT to have class "${cls}"`);
}
function parseHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div;
}


// ════════════════════════════════════════════════════════════════════════════
// ── Utility functions
// ════════════════════════════════════════════════════════════════════════════

section("escHtml");

test("escapes ampersand",        () => assertContains(escHtml("a&b"),    "&amp;"));
test("escapes less-than",        () => assertContains(escHtml("a<b"),    "&lt;"));
test("escapes greater-than",     () => assertContains(escHtml("a>b"),    "&gt;"));
test("escapes double quote",     () => assertContains(escHtml('a"b'),    "&quot;"));
test("escapes single quote",     () => assertContains(escHtml("a'b"),    "&#39;"));
test("leaves safe string alone", () => assertEqual(escHtml("hello"),     "hello"));
test("handles null",             () => assertEqual(escHtml(null),        ""));
test("handles number",           () => assertEqual(escHtml(42),          "42"));
test("escapes XSS payload",      () => { const o = escHtml('<script>alert("xss")</sc' + 'ript>'); assertNotContains(o, "<script>"); assertContains(o, "&lt;script&gt;"); });


section("formatElapsed");

test("0 seconds",             () => assertEqual(formatElapsed(0),    "0s"));
test("45 seconds",            () => assertEqual(formatElapsed(45),   "45s"));
test("59 seconds",            () => assertEqual(formatElapsed(59),   "59s"));
test("60 seconds = 1:00",     () => assertEqual(formatElapsed(60),   "1:00"));
test("90 seconds = 1:30",     () => assertEqual(formatElapsed(90),   "1:30"));
test("61 seconds = 1:01",     () => assertEqual(formatElapsed(61),   "1:01"));
test("pads single-digit secs",() => assertEqual(formatElapsed(65),   "1:05"));
test("3600 seconds = 60:00",  () => assertEqual(formatElapsed(3600), "60:00"));


section("formatDuration");

test("0 returns empty",          () => assertEqual(formatDuration(0),   ""));
test("null returns empty",        () => assertEqual(formatDuration(null),""));
test("30 seconds",                () => assertEqual(formatDuration(30),  "30s"));
test("60 seconds = 1m",           () => assertEqual(formatDuration(60),  "1m"));
test("90 seconds = 1m 30s",       () => assertEqual(formatDuration(90),  "1m 30s"));
test("120 seconds = 2m",          () => assertEqual(formatDuration(120), "2m"));
test("rounds to nearest second",  () => assertEqual(formatDuration(30.4),"30s"));


section("getLocationFlag");

test("remote keyword",           () => assertEqual(getLocationFlag("Remote"),          "REMOTE"));
test("Canada city",              () => assertEqual(getLocationFlag("Toronto, ON"),     "CA"));
test("UK city",                  () => assertEqual(getLocationFlag("London, UK"),      "UK"));
test("Germany city",             () => assertEqual(getLocationFlag("Berlin, Germany"), "DE"));
test("USA explicit",             () => assertEqual(getLocationFlag("United States"),   "US"));
test("unknown defaults to US",   () => assertEqual(getLocationFlag("Springfield"),     "US"));
test("numeric-only returns N/A", () => assertEqual(getLocationFlag("12345"),           "N/A"));
test("empty string returns N/A", () => assertEqual(getLocationFlag(""),                "N/A"));
test("null returns N/A",         () => assertEqual(getLocationFlag(null),              "N/A"));
test("Singapore",                () => assertEqual(getLocationFlag("Singapore"),       "SG"));


section("formatJobDate");

test("empty string returns empty",       () => assertEqual(formatJobDate(""), ""));
test("null returns empty",               () => assertEqual(formatJobDate(null), ""));

test("includes year for old date",       () => assertContains(formatJobDate("2020-06-15 12:00:00"), "2020"));


section("log / logErr");

test("log does not throw",    () => log("test", "message", { extra: 1 }));
test("logErr does not throw", () => logErr("test", "error",  new Error("oops")));

});

section("toggleSnippets");

function makeSnippetDOM(visible) {
  const wrap = document.createElement("div"), btn = document.createElement("button"), div = document.createElement("div");
  div.style.display = visible ? "block" : "none";
  wrap.appendChild(btn); wrap.appendChild(div); document.body.appendChild(wrap);
  return { wrap, btn, div };
}

test("shows hidden container",           () => { const {wrap,btn,div} = makeSnippetDOM(false); toggleSnippets(btn); assertEqual(div.style.display,"block");  document.body.removeChild(wrap); });
test("hides visible container",          () => { const {wrap,btn,div} = makeSnippetDOM(true);  toggleSnippets(btn); assertEqual(div.style.display,"none");   document.body.removeChild(wrap); });
test("down arrow on expand",             () => { const {wrap,btn}     = makeSnippetDOM(false); toggleSnippets(btn); assertContains(btn.innerHTML,"▼");        document.body.removeChild(wrap); });
test("right arrow on collapse",          () => { const {wrap,btn}     = makeSnippetDOM(true);  toggleSnippets(btn); assert(btn.innerHTML.includes("&#9658;") || btn.innerHTML.includes("►"), "missing right arrow"); document.body.removeChild(wrap); });

section("extractTitleFromHTML");

test("extracts h1 as title",         () => {
  const doc = new DOMParser().parseFromString('<html><head><title>Jobs</title></head><body><h1>Senior Go Developer</h1></body></html>', 'text/html');
  assertContains(extractTitleFromHTML(doc), 'Senior Go Developer');
});
test("falls back to page title",     () => {
  const doc = new DOMParser().parseFromString('<html><head><title>DevSecOps Engineer | Acme</title></head><body></body></html>', 'text/html');
  assertContains(extractTitleFromHTML(doc), 'DevSecOps Engineer');
});
test("strips site name from title",  () => {
  const doc = new DOMParser().parseFromString('<html><head><title>Python Dev - LinkedIn</title></head><body></body></html>', 'text/html');
  assertNotContains(extractTitleFromHTML(doc), 'LinkedIn');
});


section("extractCompanyFromHTML");

test("extracts from company class",  () => {
  const doc = new DOMParser().parseFromString('<html><body><div class="company-name">Acme Corp</div></body></html>', 'text/html');
  assertContains(extractCompanyFromHTML(doc), 'Acme Corp');
});
test("returns string when not found",() => {
  const doc = new DOMParser().parseFromString('<html><body><p>no company</p></body></html>', 'text/html');
  assert(typeof extractCompanyFromHTML(doc) === 'string');
});


section("clearPasteForm");

test("clears all paste form fields", () => {
  document.getElementById('paste-title').value       = 'Dev';
  document.getElementById('paste-company').value     = 'Acme';
  document.getElementById('paste-location').value    = 'Remote';
  document.getElementById('paste-url').value         = 'https://example.com';
  document.getElementById('paste-description').value = 'Some description';
  clearPasteForm();
  assertEqual(document.getElementById('paste-title').value,       '');
  assertEqual(document.getElementById('paste-company').value,     '');
  assertEqual(document.getElementById('paste-location').value,    '');
  assertEqual(document.getElementById('paste-url').value,         '');
  assertEqual(document.getElementById('paste-description').value, '');
});
test("does not throw when fields missing", () => clearPasteForm());


section("clearHTMLForm");

test("clears html-input textarea", () => {
  const el = document.getElementById('html-input');
  if (!el) { assert(true); return; } // not on this page
  el.value = '<html>some html</html>';
  clearHTMLForm();
  assertEqual(el.value, '');
});
test("does not throw when fields missing", () => clearHTMLForm());

document.body.insertAdjacentHTML("afterbegin", `
  <h1>app.js — Unit Tests</h1>

const resultsEl = document.getElementById("results");
output.forEach(item => {
  if (item.type === "section") {
    resultsEl.insertAdjacentHTML("beforeend", `<div class="section">── ${item.name}</div>`);
  } else if (item.type === "pass") {
    resultsEl.insertAdjacentHTML("beforeend", `<div class="pass">  ✓ ${item.name}</div>`);
  } else {
    resultsEl.insertAdjacentHTML("beforeend", `<div class="fail">  ✗ ${item.name} — ${item.msg}</div>`);
  }
});
