<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resumes — Job Matcher</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">// job-matcher</div>
        <h1>Resume Match</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-link" id="nav-jobs"><span class="icon">⬡</span> Jobs</a>
        <a href="/resumes" class="nav-link" id="nav-resumes"><span class="icon">◈</span> Resumes</a>
      </nav>
      <div class="sidebar-footer">SQLite · Local · v5.0</div>
    </aside>
    <main class="main">
      <div class="page-header">
        <h2>Resume Versions</h2>
        <p>Store multiple tailored resumes and choose which to compare against each job.</p>
      </div>
      <div class="card" style="margin-bottom: 28px;">
        <div class="section-title" style="margin-bottom: 14px;">Add New Version</div>
        <form id="add-resume-form">
          <div class="form-row">
            <label>Label</label>
            <input type="text" name="label" placeholder="e.g. DevSecOps v2, Full-Stack General, Federal Contractor" />
          </div>
          <div class="form-row">
            <label>Import from File <span class="text-dim" style="font-weight:normal;">(TXT, PDF, DOCX — optional)</span></label>
            <div class="flex gap-10 items-center">
              <input type="file" id="resume-file-input" accept=".txt,.pdf,.docx"
                     style="flex:1; font-size:13px;" onchange="extractResumeFile(this)" />
              <span id="resume-file-status" class="text-xs text-dim"></span>
            </div>
          </div>
          <div class="form-row">
            <label>Resume Text</label>
            <textarea name="content" id="resume-content" placeholder="Paste your full resume text here, or import a file above…"
                      style="min-height: 200px; font-family: var(--font-mono); font-size: 11px;"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Resume</button>
        </form>
      </div>
      <div id="resumes-list"></div>
    </main>
  </div>
  <div id="toast"></div>
  <script src="/static/js/app.js"></script>
</body>
</html>
